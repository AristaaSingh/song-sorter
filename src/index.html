<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src https: data:; style-src 'unsafe-inline'; script-src 'self'">
  <title>Song Sorter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: #0d0d0d;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }

    .titlebar {
      height: 38px;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 28px 28px;
      overflow: hidden;
    }

    /* --- Setup screen --- */
    #setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }

    #setup h1 { font-size: 26px; font-weight: 700; }
    #setup p { color: #aaa; font-size: 14px; line-height: 1.5; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #1db954; }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:active { opacity: .7; }
    .btn-green { background: #1db954; color: #000; }
    .btn-dark { background: #2a2a2a; color: #fff; }
    .btn-outline {
      background: transparent;
      color: #aaa;
      border: 1px solid #333;
    }

    /* --- Song card --- */
    #sorter {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    #progress-bar-wrap {
      width: 100%;
      height: 3px;
      background: #1a1a1a;
      border-radius: 2px;
      flex-shrink: 0;
    }
    #progress-bar { height: 100%; background: #1db954; border-radius: 2px; transition: width .3s; }
    #progress-label { font-size: 11px; color: #666; text-align: right; margin-top: 4px; }

    #card {
      background: #161616;
      border-radius: 16px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #album-art { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #222; }
    #card-info { padding: 16px; }
    #track-name { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #artist-name { font-size: 13px; color: #aaa; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #album-name { font-size: 12px; color: #666; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* --- Playlist section --- */
    #playlist-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    #playlist-section h3 { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: .08em; flex-shrink: 0; }

    #playlist-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 2px;
    }
    #playlist-list::-webkit-scrollbar { width: 4px; }
    #playlist-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .playlist-btn {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: background .12s, border-color .12s;
      flex-shrink: 0;
    }
    .playlist-btn:hover { background: #222; border-color: #1db954; }

    #new-playlist-row {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    #new-playlist-row input { flex: 1; }
    #new-playlist-row button { flex-shrink: 0; }

    #skip-btn {
      width: 100%;
      flex-shrink: 0;
    }

    /* --- Toast --- */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1db954;
      color: #000;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      transition: transform .25s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .hidden { display: none !important; }
    .loading { color: #555; font-size: 14px; text-align: center; margin: auto; }
  </style>
</head>
<body>
  <div class="titlebar"></div>
  <div id="app">

    <!-- Setup -->
    <div id="setup" class="hidden">
      <h1>Song Sorter</h1>
      <p>Enter your Spotify app's <strong>Client ID</strong> to get started. You only need to do this once.</p>
      <input id="client-id-input" type="text" placeholder="Client ID" spellcheck="false" />
      <button class="btn btn-green" id="auth-btn">Connect to Spotify</button>
    </div>

    <!-- Sorter -->
    <div id="sorter" class="hidden">
      <div>
        <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
        <div id="progress-label">0 / 0</div>
      </div>

      <div id="card">
        <img id="album-art" src="" alt="" />
        <div id="card-info">
          <div id="track-name">—</div>
          <div id="artist-name">—</div>
          <div id="album-name">—</div>
        </div>
      </div>

      <div id="playlist-section">
        <h3>Add to playlist</h3>
        <div id="playlist-list"></div>
        <div id="new-playlist-row">
          <input id="new-playlist-input" type="text" placeholder="New playlist name…" />
          <button class="btn btn-green" id="create-add-btn">Create & Add</button>
        </div>
        <button class="btn btn-outline" id="skip-btn">Skip →</button>
      </div>
    </div>

    <p class="loading hidden" id="loading">Loading…</p>
    <p class="loading hidden" id="done-msg">All songs sorted! 🎉</p>
  </div>

  <div id="toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
